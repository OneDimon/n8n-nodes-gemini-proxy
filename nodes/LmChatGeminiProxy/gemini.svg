<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="35%" stop-color="#9B72CB"/>
      <stop offset="70%" stop-color="#D96570"/>
      <stop offset="100%" stop-color="#F2B400"/>
    </linearGradient>
  </defs>

  <!-- Dark background circle so the icon reads clearly on any host bg -->
  <circle cx="24" cy="24" r="24" fill="#161616"/>

  <!-- Gemini four-point star, shifted to top-left so there's room for a big proxy badge -->
  <g transform="translate(-3,-3) scale(0.74)">
    <path
      d="M24 4
         C24 14 14 24 4 24
         C14 24 24 34 24 44
         C24 34 34 24 44 24
         C34 24 24 14 24 4 Z"
      fill="url(#g1)"
    />
  </g>

  <!-- Big, high-contrast proxy badge: bright green circular-arrows icon on solid disc -->
  <circle cx="34" cy="34" r="13" fill="#0B0B0B" stroke="#34D399" stroke-width="2"/>
  <path
    d="M28.5 32.2a6 6 0 0 1 9.7-3.6M39.5 35.8a6 6 0 0 1-9.7 3.6"
    stroke="#34D399"
    stroke-width="2.4"
    stroke-linecap="round"
    fill="none"
  />
  <path d="M38.3 26.3l.6 3-3 .4" stroke="#34D399" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M29.7 41.7l-.6-3 3-.4" stroke="#34D399" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
